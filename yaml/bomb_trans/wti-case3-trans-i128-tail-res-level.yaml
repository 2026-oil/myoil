task:
  name: wti_case3_bomb_trans_i128_tail_res_level
dataset:
  path: data/df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols: &id001
  - Com_Gasoline
  - Com_BloombergCommodity_BCOM
  - Com_LME_Ni_Cash
  - Com_Coal
  - Com_LME_Al_Cash
  - Com_LMEX
  - Bonds_KOR_10Y
  - Com_LME_Ni_Inv
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
  transformations_target: diff
  transformations_exog: diff
training:
  train_protocol: expanding_window_tscv
  input_size: 128
  season_length: 52
  batch_size: 16
  valid_batch_size: 16
  windows_batch_size: 256
  inference_windows_batch_size: 1024
  learning_rate: 0.0007
  max_steps: 1600
  val_size: 8
  val_check_steps: 100
  early_stop_patience_steps: 10
  num_lr_decays: 2
  model_step_size: 1
  scaler_type: robust
  loss: exloss
  loss_params:
    up_th: 0.85
    down_th: 0.15
    lamda_underestimate: 2.0
    lamda_overestimate: 1.0
    lamda: 1.3
cv:
  horizon: 8
  step_size: 8
  n_windows: 1
  gap: 0
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 1
  worker_devices: 1
residual:
  enabled: true
  model: xgboost
  target: level
  params:
    n_estimators: 64
    max_depth: 4
    learning_rate: 0.03
    subsample: 0.8
    colsample_bytree: 0.9
  features:
    include_base_prediction: true
    include_horizon_step: true
    include_date_features: true
    lag_features:
      enabled: true
      sources:
      - y_hat_base
      - Com_Gasoline
      - Com_BloombergCommodity_BCOM
      - Bonds_KOR_10Y
      steps:
      - 1
      - 2
      - 3
      - 4
      - 6
      transforms:
      - raw
    exog_sources:
      hist: *id001
      futr: []
      static: []
jobs:
- model: PatchTST
  params:
    hidden_size: 192
    n_heads: 8
    encoder_layers: 3
    linear_hidden_size: 384
    patch_len: 8
    stride: 4
    dropout: 0.1
    fc_dropout: 0.1
    head_dropout: 0.0
    attn_dropout: 0.0
    revin: true
    revin_affine: true
    revin_subtract_last: true
    activation: gelu
    res_attention: true
    batch_normalization: true
    learn_pos_embed: true
- model: TSMixerx
  params:
    n_block: 3
    ff_dim: 128
    dropout: 0.1
    revin: true
- model: Naive
  params: {}
- model: iTransformer
  params:
    hidden_size: 96
    n_heads: 4
    e_layers: 2
    d_ff: 512
    d_layers: 1
    factor: 3
    dropout: 0.1
    use_norm: true
- model: LSTM
  params:
    encoder_hidden_size: 32
    encoder_n_layers: 3
    inference_input_size: 128
    encoder_dropout: 0.0
    decoder_hidden_size: 256
    decoder_layers: 3
- model: NHITS
  params:
    n_pool_kernel_size:
    - 8
    - 4
    - 1
    n_freq_downsample:
    - 4
    - 2
    - 1
    n_blocks:
    - 2
    - 2
    - 2
    mlp_units:
    - - 512
      - 512
    - - 512
      - 512
    - - 512
      - 512
    dropout_prob_theta: 0.2
    activation: LeakyReLU

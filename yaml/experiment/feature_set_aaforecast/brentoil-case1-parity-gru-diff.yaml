task:
  name: brentoil_case1_parity_gru_diff
dataset:
  path: data/df.csv
  target_col: Com_BrentCrudeOil
  dt_col: dt
  hist_exog_cols:
    - GPRD_THREAT
    - BS_Core_Index_A
    - GPRD_ACT
    - Idx_OVX
    - GPRD
    - BS_Core_Index_C
    - Com_BloombergCommodity_BCOM
    - Com_LMEX
  futr_exog_cols: []
  static_exog_cols: []
training_search:
  enabled: false
jobs:
  - model: GRU
    params:
      encoder_hidden_size: 128
      encoder_n_layers: 3
      encoder_dropout: 0.1
      decoder_hidden_size: 128
      decoder_layers: 2

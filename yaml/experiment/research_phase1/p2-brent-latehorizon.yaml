task:
  name: research_p2_brent_latehorizon
dataset:
  path: data/df.csv
  target_col: Com_BrentCrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_LME_Ni_Cash
  - Com_LME_Cu_Cash
  - Com_LME_Al_Cash
  - Com_LME_Zn_Cash
  - Com_LME_Ni_Inv
  - Com_LME_Cu_Inv
  - Com_Gasoline
  - Com_NaturalGas
  - Com_Coal
  - Com_Oil_Spread
  - Com_BloombergCommodity_BCOM
  - Com_LMEX
  - Idx_DxyUSD
  - Idx_SnP500
  - Idx_SnPVIX
  - Idx_OVX
  - Idx_GVZ
  - GPRD
  - GPRD_ACT
  - GPRD_THREAT
  - Bonds_US_10Y
  - Bonds_US_2Y
  - Bonds_CHN_10Y
  - EX_USD_CNY
  - EX_USD_KRW
  - BS_Core_Index_A
  - BS_Core_Index_B
  - BS_Core_Index_Integrated
  futr_exog_cols: []
  static_exog_cols: []
residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 64
    max_depth: 4
    subsample: 0.8
    colsample_bytree: 0.8
jobs:
- model: LSTM_new
  params:
    encoder_hidden_size: 128
    decoder_hidden_size: 128
    encoder_n_layers: 3
    encoder_dropout: 0.1
- model: TimeXer
  params:
    patch_len: 8
    hidden_size: 128
    n_heads: 8
    e_layers: 3
    d_ff: 256
    factor: 4
    dropout: 0.05
    use_norm: true
- model: iTransformer
  params:
    hidden_size: 128
    n_heads: 8
    e_layers: 3
    d_ff: 256
    dropout: 0.05
    use_norm: true

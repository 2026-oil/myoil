task:
  name: research_iter3_oilcore_large
dataset:
  path: data/df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_Gasoline
  - Com_NaturalGas
  - Com_Coal
  - Com_Oil_Spread
  - Com_BloombergCommodity_BCOM
  - Com_LMEX
  - Idx_OVX
  - Idx_GVZ
  - Idx_SnPVIX
  - GPRD_THREAT
  - GPRD_ACT
  - BS_Core_Index_Integrated
  futr_exog_cols: []
  static_exog_cols: []
residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 256
    max_depth: 8
    subsample: 0.8
    colsample_bytree: 0.8
aa_forecast:
  enabled: true
  config_path: yaml/plugins/aa_forecast_iter3_oilcore_large.yaml

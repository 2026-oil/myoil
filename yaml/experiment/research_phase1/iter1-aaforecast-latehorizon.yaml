task:
  name: research_iter1_aaforecast_latehorizon
dataset:
  path: data/df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_LME_Ni_Cash
  - Com_LME_Cu_Cash
  - Com_LME_Al_Cash
  - Com_LME_Zn_Cash
  - Com_LME_Ni_Inv
  - Com_LME_Cu_Inv
  - Com_Gasoline
  - Com_NaturalGas
  - Com_Coal
  - Com_Oil_Spread
  - Com_BloombergCommodity_BCOM
  - Com_LMEX
  - Idx_DxyUSD
  - Idx_SnP500
  - Idx_SnPVIX
  - Idx_OVX
  - Idx_GVZ
  - GPRD
  - GPRD_ACT
  - GPRD_THREAT
  - Bonds_US_10Y
  - Bonds_US_2Y
  - Bonds_CHN_10Y
  - EX_USD_CNY
  - EX_USD_KRW
  - BS_Core_Index_A
  - BS_Core_Index_B
  - BS_Core_Index_Integrated
  futr_exog_cols: []
  static_exog_cols: []
residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 128
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
jobs:
- model: AAForecast
  params:
    encoder_hidden_size: 256
    decoder_hidden_size: 256
    encoder_n_layers: 3
    encoder_dropout: 0.1
    season_length: 4
    trend_kernel_size: 5
    anomaly_threshold: 2.5

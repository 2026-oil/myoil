task:
  name: brentoil_case1_HPO
dataset:
  path: data/df.csv
  target_col: BS_Core_Index_Integrated
  dt_col: dt
  hist_exog_cols:
  - Idx_SnPVIX
  - Bonds_MOVE
  - Idx_GVZ
  - Idx_OVX
  - Idx_DxyUSD
  - Com_BloombergCommodity_BCOM
  - Com_LMEX
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  opt_n_trial: 100
training:
  val_check_steps: 50
  early_stop_patience_steps: 3
  loss: mse
  dataloader_kwargs:
    num_workers: 2
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
cv:
  horizon: 8
  step_size: 8
  n_windows: 5
  max_train_size: null
scheduler:
  gpu_ids:
  - 0
  - 1
  parallelize_single_job_tuning: true
residual:
  enabled: false
jobs: yaml/jobs_tune.yaml

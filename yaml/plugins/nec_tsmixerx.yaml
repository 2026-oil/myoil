nec:
  preprocessing:
    mode: diff_std
    gmm_components: 3
    epsilon: 1.5
  inference:
    mode: soft_weighted
    threshold: 0.5
  classifier:
    model: TSMixerx
    variables:
      - Idx_OVX
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      n_block: 3
      ff_dim: 96
      dropout: 0.1
      revin: true
    alpha: 2.0
    beta: 0.5
    oversample_extreme_windows: true
  normal:
    model: TSMixerx
    variables:
      - Idx_OVX
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      n_block: 3
      ff_dim: 96
      dropout: 0.1
      revin: true
    oversample_extreme_windows: false
  extreme:
    model: TSMixerx
    variables:
      - Idx_OVX
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      n_block: 3
      ff_dim: 96
      dropout: 0.1
      revin: true
    oversample_extreme_windows: true
  validation:
    windows: 8

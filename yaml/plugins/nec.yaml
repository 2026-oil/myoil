nec:
  preprocessing:
    mode: diff_std
    gmm_components: 3
    epsilon: 1.5
  inference:
    mode: soft_weighted
    threshold: 0.5
  classifier:
    model: LSTM
    variables: []
    model_params:
      encoder_hidden_size: 128
      encoder_n_layers: 2
      decoder_hidden_size: 128
      decoder_layers: 2
      max_steps: 100
      batch_size: 32
  normal:
    model: LSTM
    variables:
      - Com_Gasoline
      - Com_Steel
    model_params:
      encoder_hidden_size: 128
      encoder_n_layers: 2
      decoder_hidden_size: 128
      decoder_layers: 2
      max_steps: 100
      batch_size: 32
  extreme:
    model: LSTM
    variables:
      - Com_Gasoline
      - Com_Steel
      - Bonds_US_Spread_10Y_1Y
    model_params:
      encoder_hidden_size: 128
      encoder_n_layers: 2
      decoder_hidden_size: 128
      decoder_layers: 2
      max_steps: 100
      batch_size: 32
  validation:
    windows: 8

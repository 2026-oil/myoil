nec:
  preprocessing:
    mode: diff_std
    gmm_components: 3
    epsilon: 1.5
  inference:
    mode: soft_weighted
    threshold: 0.5
  classifier:
    model: LSTM
    variables:
      - Idx_OVX  
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      encoder_hidden_size: 128
      encoder_n_layers: 2
      decoder_hidden_size: 128
      decoder_layers: 2
      max_steps: 100
      batch_size: 32
    alpha: 2.0
    beta: 0.5
    oversample_extreme_windows: true
  normal:
    model: LSTM
    variables:
      - Idx_OVX  
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      encoder_hidden_size: 128
      encoder_n_layers: 2
      decoder_hidden_size: 128
      decoder_layers: 2
      max_steps: 100
      batch_size: 32
    oversample_extreme_windows: false
  extreme:
    model: LSTM
    variables:
      - Idx_OVX  
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      encoder_hidden_size: 128
      encoder_n_layers: 2
      decoder_hidden_size: 128
      decoder_layers: 2
      max_steps: 100
      batch_size: 32
    oversample_extreme_windows: true
  validation:
    windows: 8

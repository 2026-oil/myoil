retrieval:
  enabled: true
  star:
    season_length: 4
    lowess_frac: 0.35
    lowess_delta: 0.01
    thresh: 3.5
    anomaly_tails:
      upward:
      - GPRD_THREAT
      - BS_Core_Index_A
      - BS_Core_Index_C
      - Idx_OVX
      two_sided: []
  mode: posthoc_blend
  top_k: 1
  recency_gap_steps: 8
  event_score_threshold: 400.0
  min_similarity: 0.7
  similarity: cosine
  temperature: 0.1
  blend_floor: 0.0
  blend_max: 1.0
  use_uncertainty_gate: true
  use_shape_key: false
  use_event_key: true
  event_score_log_bonus_alpha: 0.15
  event_score_log_bonus_cap: 0.1

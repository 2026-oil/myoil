aa_forecast:
  model: informer
  tune_training: false
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    sample_count: 50
  model_params: 
    hidden_size: 128
    n_head: 8
    encoder_layers: 2
    dropout: 0.1
    linear_hidden_size: 256
    factor: 3
    decoder_hidden_size: 128
    decoder_layers: 4
    season_length: 52
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    two_sided: []
  top_k: 0.1

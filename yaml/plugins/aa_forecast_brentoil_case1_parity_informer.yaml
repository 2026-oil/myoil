aa_forecast:
    model: informer
    tune_training: false
    lowess_frac: 0.35
    lowess_delta: 0.01
    uncertainty:
      enabled: true
      sample_count: 50
    model_params:
      hidden_size: 256
      n_head: 4
      encoder_layers: 3
      dropout: 0.2
      linear_hidden_size: 256
      factor: 5
      decoder_hidden_size: 256
      decoder_layers: 4
      season_length: 4
    star_anomaly_tails:
      upward:
      - GPRD_THREAT
      - BS_Core_Index_A
      two_sided: []
    thresh: 2.5
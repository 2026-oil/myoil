aa_forecast:
  model: gru
  tune_training: true
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    sample_count: 50
  model_params:
    encoder_hidden_size: 256
    encoder_n_layers: 2
    encoder_dropout: 0.1
    decoder_hidden_size: 256
    decoder_layers: 3
    season_length: 4
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    two_sided: []
  thresh: 3.5
  retrieval:
    enabled: true
    top_k: 5
    recency_gap_steps: 8
    event_score_threshold: 1.0
    min_similarity: 0.55
    blend_max: 0.25
    use_uncertainty_gate: true

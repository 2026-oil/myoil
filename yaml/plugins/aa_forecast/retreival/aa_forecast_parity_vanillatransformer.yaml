aa_forecast:
  model: vanillatransformer
  tune_training: false
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    sample_count: 50
  model_params:
    hidden_size: 128
    n_head: 8
    encoder_layers: 2
    dropout: 0.1
    linear_hidden_size: 256
    decoder_hidden_size: 128
    decoder_layers: 4
    season_length: 4
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    - BS_Core_Index_C
    two_sided: []
  thresh: 3.5
  retrieval:
    enabled: false
    top_k: 5
    recency_gap_steps: 8
    trigger_quantile: 0.8
    min_similarity: 0.55
    blend_max: 0.25
    use_uncertainty_gate: true

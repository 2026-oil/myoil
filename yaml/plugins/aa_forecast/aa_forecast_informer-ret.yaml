aa_forecast:
  model: informer
  tune_training: false
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    dropout_candidates:
    - 0.01
    - 0.05
    - 0.1
    - 0.15
    - 0.2
    - 0.25
    - 0.3
    sample_count: 50
  model_params:
    hidden_size: 160
    n_head: 4
    encoder_layers: 2
    dropout: 0.0
    linear_hidden_size: 128
    factor: 3
    decoder_hidden_size: 192
    decoder_layers: 4
    season_length: 4
    semantic_negative_scale: 0.95
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    - BS_Core_Index_C
    two_sided: []
  thresh: 3.5
  retrieval:
    enabled: true
    mode: posthoc_blend
    top_k: 1
    recency_gap_steps: 8
    trigger_quantile: 0.9
    event_score_threshold: 1.0
    neighbor_min_event_ratio: 0.8
    min_similarity: 0.35
    similarity: cosine
    temperature: 0.1
    memory_value_mode: future_level
    blend_floor: 0.3
    blend_max: 0.3
    use_uncertainty_gate: false
    use_shape_key: false
    use_event_key: true
    event_score_log_bonus_alpha: 0.15
    event_score_log_bonus_cap: 0.1

aa_forecast:
  model: gru
  tune_training: false
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    dropout_candidates:
    - 0.01
    - 0.05
    - 0.1
    - 0.15
    - 0.2
    - 0.25
    - 0.3
    sample_count: 50
  model_params:
    encoder_hidden_size: 256
    encoder_n_layers: 2
    encoder_dropout: 0.1
    decoder_hidden_size: 256
    decoder_layers: 3
    season_length: 4
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    - BS_Core_Index_C
    two_sided: []
  thresh: 3.5
  retrieval:
    enabled: true
    config_path: ../retrieval/baseline_retrieval.yaml

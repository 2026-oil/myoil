aa_forecast:
  model: informer
  tune_training: true
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    dropout_candidates:
    - 0.01
    - 0.05
    - 0.1
    - 0.15
    - 0.2
    - 0.25
    - 0.3
    sample_count: 50
  model_params: {}
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    - BS_Core_Index_C
    two_sided: []
  thresh: 3.5
  retrieval:
    enabled: true
    config_path: ../retrieval/baseline_retrieval.yaml

aa_forecast:
  model: timexer
  tune_training: false
  lowess_frac: 0.359
  lowess_delta: 0.008
  thresh: 3.08
  uncertainty:
    enabled: true
    sample_count: 50

  model_params:
    hidden_size: 128
    n_heads: 8
    e_layers: 2
    dropout: 0.1
    d_ff: 256
    patch_len: 8
    use_norm: true
    decoder_hidden_size: 128
    decoder_layers: 4
    season_length: 4
  star_anomaly_tails:
    upward:
    - GPRD
    - GPRD_ACT
    - GPRD_THREAT
    two_sided: []
  retrieval:
    enabled: true
    config_path: ../retrieval/baseline_retrieval.yaml

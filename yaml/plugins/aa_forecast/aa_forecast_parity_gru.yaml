aa_forecast:
  model: gru
  tune_training: false
  lowess_frac: 0.35
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    dropout_candidates:
    - 0.005
    - 0.01
    - 0.03
    - 0.05
    - 0.07
    - 0.09
    - 0.12
    - 0.15
    - 0.18
    - 0.2
    - 0.25
    - 0.3
    sample_count: 30
  model_params:
    encoder_hidden_size: 256
    encoder_n_layers: 2
    encoder_dropout: 0.1
    decoder_hidden_size: 256
    decoder_layers: 3
    season_length: 4
  star_anomaly_tails:
    upward:
    - GPRD_THREAT
    - BS_Core_Index_A
    - GPRD
  thresh: 3.5
  retrieval:
    enabled: false
    top_k: 1
    event_score_threshold: 400.0
    min_similarity: 0.35
    blend_max: 1.0
    use_uncertainty_gate: false
    use_shape_key: false
    use_event_key: true
    event_score_log_bonus_alpha: 0.15
    event_score_log_bonus_cap: 0.1

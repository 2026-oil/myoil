aa_forecast:
  model: gru
  tune_training: false
  lowess_frac: 0.6
  lowess_delta: 0.01
  uncertainty:
    enabled: true
    sample_count: 5
  model_params:
    encoder_hidden_size: 128
    encoder_n_layers: 2
    encoder_dropout: 0.0
    decoder_hidden_size: 128
    decoder_layers: 2
    attention_hidden_size: 32
    season_length: 52
  star_anomaly_tails:
    upward: []
    two_sided:
    - BS_Core_Index_A
    - BS_Core_Index_B
    - BS_Core_Index_C
  top_k: 0.05

nec:
  preprocessing:
    mode: diff_std
    gmm_components: 3
    epsilon: 1.5
  inference:
    mode: soft_weighted
    threshold: 0.5
  classifier:
    model: TimeXer
    variables:
      - Idx_OVX
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      patch_len: 16
      hidden_size: 64
      n_heads: 4
      e_layers: 2
      d_ff: 128
      factor: 1
      dropout: 0.1
      use_norm: true
    alpha: 2.0
    beta: 0.5
    oversample_extreme_windows: true
  normal:
    model: TimeXer
    variables:
      - Idx_OVX
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      patch_len: 16
      hidden_size: 64
      n_heads: 4
      e_layers: 2
      d_ff: 128
      factor: 1
      dropout: 0.1
      use_norm: true
    oversample_extreme_windows: false
  extreme:
    model: TimeXer
    variables:
      - Idx_OVX
      - Com_Oil_Spread
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - Com_LMEX
      - Com_BloombergCommodity_BCOM
      - GPRD_THREAT
      - GPRD
      - GPRD_ACT
    model_params:
      patch_len: 16
      hidden_size: 64
      n_heads: 4
      e_layers: 2
      d_ff: 128
      factor: 1
      dropout: 0.1
      use_norm: true
    oversample_extreme_windows: true
  validation:
    windows: 8

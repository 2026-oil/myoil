task:
  name: brentoil_case3_HPO
dataset:
  path: data/df.csv
  target_col: Com_BrentCrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_Gasoline
  - Com_BloombergCommodity_BCOM
  - Com_LME_Ni_Cash
  - Com_Coal
  - Com_LME_Al_Cash
  - Bonds_KOR_10Y
  - Com_LMEX
  - Com_LME_Ni_Inv
  - BS_Core_Index_A
  - BS_Core_Index_B
  - BS_Core_Index_C
  - BS_Core_Index_Integrated
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  opt_n_trial: 100
training:
  dataloader_kwargs:
    num_workers: 2
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
scheduler:
  parallelize_single_job_tuning: true
residual:
  enabled: false
jobs: yaml/jobs_tune.yaml

- model: GRU
  params:
    encoder_hidden_size: 128
    encoder_n_layers: 2
    encoder_dropout: 0.2
    decoder_hidden_size: 128
    decoder_layers: 2
- model: Informer
  params:
    hidden_size: 128
    n_head: 2
    encoder_layers: 2
    dropout: 0.2
    factor: 2
    decoder_layers: 2
- model: TimeXer
  params:
    patch_len: 4
    hidden_size: 128
    n_heads: 2
    e_layers: 2
    d_ff: 128
    factor: 2
    dropout: 0.2
    use_norm: true


- model: GRU
  params:
    encoder_hidden_size: 256
    encoder_n_layers: 2
    encoder_dropout: 0.1
    decoder_hidden_size: 256
    decoder_layers: 3
- model: Informer
  params:
    hidden_size: 128
    n_head: 8
    encoder_layers: 2
    dropout: 0.1
    factor: 3
    decoder_layers: 4
- model: PatchTST
  params:
    hidden_size: 128
    n_heads: 8
    encoder_layers: 2
    dropout: 0.1
    linear_hidden_size: 256
    attn_dropout: 0.0
    patch_len: 8
    stride: 4
    decoder_layers: 4
- model: TimeXer
  params:
    patch_len: 8
    hidden_size: 128
    n_heads: 8
    e_layers: 2
    d_ff: 256
    factor: 3
    dropout: 0.1
    use_norm: true


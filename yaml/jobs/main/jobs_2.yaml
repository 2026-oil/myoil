- model: TimeXer
  params:
    patch_len: 16
    hidden_size: 64
    n_heads: 4
    e_layers: 2
    d_ff: 128
    factor: 1
    dropout: 0.1
    use_norm: true
- model: TSMixerx
  params:
    n_block: 2
    ff_dim: 64
    dropout: 0.10
    revin: true
- model: Naive
  params: {}
- model: iTransformer
  params:
    hidden_size: 64
    n_heads: 4
    e_layers: 2
    d_ff: 256
    dropout: 0.05
- model: LSTM
  params:
    encoder_hidden_size: 64
    decoder_hidden_size: 64
    encoder_n_layers: 4
    context_size: 10

task:
  name: wti_case3_residual_bs_hpt
dataset:
  path: data/df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_Gasoline
  - Com_BloombergCommodity_BCOM
  - Com_LME_Ni_Cash
  - Com_Coal
  - Com_LME_Al_Cash
  - Com_LMEX
  - Bonds_KOR_10Y
  - Com_LME_Ni_Inv
  - BS_Core_Index_A
  - BS_Core_Index_B
  - BS_Core_Index_C
  - BS_Core_Index_Integrated
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
training:
  train_protocol: expanding_window_tscv
  input_size: 64
  season_length: 52
  batch_size: 32
  valid_batch_size: 64
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  learning_rate: 0.001
  model_step_size: 8
  max_steps: 1000
  val_size: 8
  val_check_steps: 50
  early_stop_patience_steps: 5
  loss: mse
cv:
  horizon: 8
  step_size: 8
  n_windows: 12
  gap: 0
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 2
  worker_devices: 1
residual:
  enabled: true
  model: xgboost
  target: level
  params: {}
  features:
    include_base_prediction: true
    include_horizon_step: true
    include_date_features: false
    lag_features:
      enabled: true
      sources:
      - y_hat_base
      steps:
      - 1
      - 2
      - 3
      - 4
      - 6
      - 12
      transforms:
      - raw
    exog_sources:
      hist:
      - Com_Gasoline
      - Com_BloombergCommodity_BCOM
      - Com_LME_Ni_Cash
      - Com_Coal
      - Com_LME_Al_Cash
      - Bonds_KOR_10Y
      - Com_LMEX
      - Com_LME_Ni_Inv
      - BS_Core_Index_A
      - BS_Core_Index_B
      - BS_Core_Index_C
      - BS_Core_Index_Integrated
      futr: []
      static: []
jobs: yaml/jobs_tune.yaml

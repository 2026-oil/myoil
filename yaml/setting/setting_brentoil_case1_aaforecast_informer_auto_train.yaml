runtime:
  random_seed: 1
  opt_study_count: 2
  # opt_n_trial: 4
  opt_n_trial: 12
  transformations_target: null
  transformations_exog: diff
training:
  input_size: 24
  batch_size: 32
  valid_batch_size: 4
  windows_batch_size: 64
  inference_windows_batch_size: 64
  max_steps: 800
  val_size: 16
  scaler_type: null
  val_check_steps: 4
  min_steps_before_early_stop: 200
  model_step_size: 1
  early_stop_patience_steps: 8
  #새로추가 기존 loss는 mse였음
  loss: latehorizonweightedmape
  loss_params:
    horizon: 4
    late_start: 3
    late_multiplier: 5.0
    ramp_power: 2.0
    base_weight: 1.0
  optimizer:
    name: adamw
    kwargs: {}
  lr_scheduler:
    name: ReduceLROnPlateau
    max_lr: 0.0003
    mode: min
    factor: 0.5
    patience: 2
    threshold: 0.001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.0
    eps: 0.000001
cv:
  gap: 0
  horizon: 4
  step_size: 4
  n_windows: 4
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0, 1]
  max_concurrent_jobs: 2
  worker_devices: 1

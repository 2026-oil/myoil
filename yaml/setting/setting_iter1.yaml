runtime:
  random_seed: 1
  opt_n_trial: 300
training:
  input_size: 96
  batch_size: 32
  valid_batch_size: 64
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  max_steps: 3000
  val_size: 16
  scaler_type: robust
  val_check_steps: 1
  min_steps_before_early_stop: 800
  model_step_size: 1
  early_stop_patience_steps: 50
  loss: latehorizonweightedmape
  loss_params:
    horizon: 8
    ramp_power: 3.0
    base_weight: 0.3
    late_multiplier: 8.0
    late_start: 6
  optimizer:
    name: adamw
    kwargs: {}
  lr_scheduler:
    name: ReduceLROnPlateau
    max_lr: 0.0005
    mode: min
    factor: 0.3
    patience: 5
    threshold: 0.001
    threshold_mode: rel
    cooldown: 2
    min_lr: 0.0
    eps: 0.00000001
cv:
  gap: 0
  horizon: 8
  step_size: 4
  n_windows: 4
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0, 1]
  max_concurrent_jobs: 2
  worker_devices: 1

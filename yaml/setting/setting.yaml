runtime:
  random_seed: 1
training:
  input_size: 64
  batch_size: 32
  valid_batch_size: 64
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  max_steps: 1000
  val_size: 8
  val_check_steps: 50
  model_step_size: 8
  early_stop_patience_steps: 5
  loss: mse
  lr_scheduler:
    name: OneCycleLR
    max_lr: 0.001
    pct_start: 0.3
    div_factor: 25.0
    final_div_factor: 10000.0
    anneal_strategy: cos
    three_phase: false
    cycle_momentum: false
cv:
  gap: 0
  horizon: 8
  step_size: 8
  n_windows: 12
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0, 1]
  max_concurrent_jobs: 2
  worker_devices: 1

runtime:
  random_seed: 1
training:
  input_size: 64
  batch_size: 32
  valid_batch_size: 64
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  max_steps: 2000
  val_size: 24
  val_check_steps: 20
  min_steps_before_early_stop: 500
  model_step_size: 8
  early_stop_patience_steps: 3
  loss: mse
  optimizer:
    name: adamw
    kwargs: {}
  lr_scheduler:
    name: ReduceLROnPlateau
    max_lr: 0.001
    mode: min
    factor: 0.5
    patience: 1
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.0
    eps: 1.0e-08
cv:
  gap: 0
  horizon: 8
  step_size: 8
  n_windows: 6
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 2
  worker_devices: 1

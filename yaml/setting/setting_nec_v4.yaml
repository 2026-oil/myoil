runtime:
  random_seed: 1
training:
  input_size: 96
  batch_size: 32
  valid_batch_size: 64
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  max_steps: 1000
  val_size: 16
  scaler_type: robust
  val_check_steps: 1
  min_steps_before_early_stop: 200
  model_step_size: 1
  early_stop_patience_steps: 30
  loss: mse
  optimizer:
    name: adamw
    kwargs: {}
  lr_scheduler:
    name: ReduceLROnPlateau
    max_lr: 0.001
    mode: min
    factor: 0.5
    patience: 5
    threshold: 0.001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.0
    eps: 0.00000001
cv:
  gap: 0
  horizon: 8
  step_size: 4
  n_windows: 16
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0, 1]
  max_concurrent_jobs: 2
  worker_devices: 1
task:
  name: brentoil_case1
dataset:
  path: data/df.csv
  target_col: Com_BrentCrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_Gasoline
  - Com_Steel
  - Bonds_US_Spread_10Y_1Y
  - Bonds_CHN_Spread_30Y_5Y
  - EX_USD_BRL
  - Com_Cheese
  - Bonds_BRZ_Spread_10Y_1Y
  - Com_Cu_Gold_Ratio
  - Idx_OVX
  - Com_Oil_Spread
  - Com_LME_Zn_Spread
  - Idx_CSI300
  - Bonds_CHN_Spread_5Y_1Y
  - Com_LME_Cu_Spread
  - Com_LME_Pb_Spread
  - Com_LME_Al_Spread
  - BS_Core_Index_A
  - BS_Core_Index_B
  - BS_Core_Index_C
  - BS_Core_Index_Integrated
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
  transformations_target: diff
  transformations_exog: diff
training:
  train_protocol: expanding_window_tscv
  input_size: 64
  season_length: 52
  batch_size: 32
  valid_batch_size: 64
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  learning_rate: 0.001
  model_step_size: 8
  max_steps: 1000
  val_size: 8
  val_check_steps: 50
  early_stop_patience_steps: 5
  loss: mse
cv:
  horizon: 8
  step_size: 8
  n_windows: 12
  gap: 0
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 2
  worker_devices: 1
residual:
  enabled: false
jobs: yaml/jobs_default.yaml

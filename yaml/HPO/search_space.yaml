      - 256
      - 512
      - 768
    n_heads:
      type: categorical
      choices:
      - 16
      - 32
    e_layers:
      type: categorical
      choices:
      - 4
      - 8
    d_ff:
      type: categorical
      choices:
      - 1024
      - 2048
    d_layers:
      type: categorical
      choices:
      - 4
      - 8

residual:
  xgboost:
    n_estimators:
      type: categorical
      choices:
      - 16
      - 32
      - 64
      - 128
    max_depth:
      type: int
      low: 2
      high: 6
      step: 1
    subsample:
      type: float
      low: 0.5
      high: 1.0
    colsample_bytree:
      type: float
      low: 0.5
      high: 1.0
  randomforest:
    n_estimators:
      type: categorical
      choices:
      - 64
      - 128
      - 200
      - 300
    max_depth:
      type: categorical
      choices:
      - 4
      - 6
      - 8
      - 12
      - null
    min_samples_leaf:
      type: categorical
      choices:
      - 1
      - 2
      - 4
      - 8
    max_features:
      type: categorical
      choices:
      - sqrt
      - log2
      - 1.0
  lightgbm:
    n_estimators:
      type: categorical
      choices:
      - 32
      - 64
      - 96
      - 128
    max_depth:
      type: categorical
      choices:
      - 4
      - 6
      - 8
      - -1
    num_leaves:
      type: categorical
      choices:
      - 15
      - 31
      - 63
    min_child_samples:
      type: categorical
      choices:
      - 10
      - 20
      - 40
    feature_fraction:
      type: float
      low: 0.6
      high: 1.0

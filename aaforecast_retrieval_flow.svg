<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <style>
      .title { font: 700 26px 'Georgia', 'Times New Roman', serif; fill: #111; }
      .label { font: 600 18px 'Georgia', 'Times New Roman', serif; fill: #111; }
      .text { font: 16px 'Georgia', 'Times New Roman', serif; fill: #222; }
      .small { font: 15px 'Georgia', 'Times New Roman', serif; fill: #222; }
      .tiny { font: 12px 'Georgia', 'Times New Roman', serif; fill: #333; }
      .mono { font: 14px 'Courier New', monospace; fill: #2c3e50; }
      .panel { fill: #fafafa; stroke: #444; stroke-width: 2.3; stroke-dasharray: 10 6; rx: 28; ry: 28; }
      .arrow { stroke: #222; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .dasharrow { stroke: #444; stroke-width: 1.9; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrowhead); }
      .cardstroke { stroke: #333; stroke-width: 2.2; rx: 18; ry: 18; }
      .outbox { fill: #fcfcfc; stroke: #222; stroke-width: 2.2; rx: 18; ry: 18; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#222"/>
    </marker>
    <linearGradient id="goldGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5cb54"/>
      <stop offset="100%" stop-color="#d7a41d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#de7d37"/>
      <stop offset="100%" stop-color="#b95b19"/>
    </linearGradient>
    <linearGradient id="beigeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fdf1c0"/>
      <stop offset="100%" stop-color="#f4e5a7"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d5ead8"/>
      <stop offset="100%" stop-color="#b9d6bf"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#72ddd3"/>
      <stop offset="100%" stop-color="#43b7ae"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4bbcf2"/>
      <stop offset="100%" stop-color="#1c86c8"/>
    </linearGradient>
    <linearGradient id="lavGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d8dbe8"/>
      <stop offset="100%" stop-color="#bfc5d7"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3b6af"/>
      <stop offset="100%" stop-color="#e68f84"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background Panels -->
  <rect x="20" y="55" width="300" height="500" class="panel"/>
  <rect x="330" y="55" width="300" height="500" class="panel"/>
  <rect x="640" y="55" width="300" height="500" class="panel"/>
  <rect x="950" y="55" width="300" height="500" class="panel"/>
  <rect x="1260" y="55" width="320" height="500" class="panel"/>

  <!-- Aligned Titles -->
  <text x="170" y="95" text-anchor="middle" class="title">Signature</text>
  <text x="170" y="127" text-anchor="middle" class="title">Extraction</text>

  <text x="480" y="95" text-anchor="middle" class="title">Memory Bank</text>
  <text x="480" y="127" text-anchor="middle" class="title">Similarity Search</text>

  <text x="790" y="95" text-anchor="middle" class="title">Memory</text>
  <text x="790" y="127" text-anchor="middle" class="title">Prediction</text>

  <text x="1100" y="95" text-anchor="middle" class="title">Uncertainty</text>
  <text x="1100" y="127" text-anchor="middle" class="title">Gated Blend</text>

  <text x="1420" y="95" text-anchor="middle" class="title">Final</text>
  <text x="1420" y="127" text-anchor="middle" class="title">Output</text>

  <!-- Panel 1: Signature Extraction -->
  <g filter="url(#shadow)">
    <rect x="45" y="160" width="250" height="70" fill="url(#mintGrad)" class="cardstroke"/>
    <text x="170" y="195" text-anchor="middle" class="label">Shape Vector</text>
    <text x="170" y="215" text-anchor="middle" class="small">(Normalized Target)</text>

    <rect x="45" y="260" width="250" height="70" fill="url(#beigeGrad)" class="cardstroke"/>
    <text x="170" y="295" text-anchor="middle" class="label">Event Vector</text>
    <text x="170" y="315" text-anchor="middle" class="small">(STAR Masks + Activity)</text>

    <rect x="45" y="360" width="250" height="70" fill="url(#roseGrad)" class="cardstroke"/>
    <text x="170" y="395" text-anchor="middle" class="label">Event Score</text>
    <text x="170" y="415" text-anchor="middle" class="small">(Eventfulness Sum)</text>
    
    <text x="170" y="475" text-anchor="middle" class="mono" fill="#444">Current 64-step Window</text>
  </g>

  <!-- Panel 2: Memory Bank Search -->
  <g filter="url(#shadow)">
    <rect x="355" y="160" width="250" height="90" fill="url(#lavGrad)" class="cardstroke"/>
    <text x="480" y="190" text-anchor="middle" class="label">Cosine Similarity</text>
    <text x="480" y="215" text-anchor="middle" class="small">Shape (0.2) + Event (0.8)</text>
    <text x="480" y="235" text-anchor="middle" class="tiny" fill="#444">w/ Query vs Bank Candidates</text>
    
    <rect x="355" y="290" width="250" height="60" fill="#fff" class="cardstroke"/>
    <text x="480" y="325" text-anchor="middle" class="label" fill="#ef6f68">Threshold Filter (≥0.55)</text>

    <rect x="355" y="390" width="250" height="80" fill="url(#goldGrad)" class="cardstroke"/>
    <text x="480" y="425" text-anchor="middle" class="label" fill="#fff">Top-K Neighbors</text>
    <text x="480" y="450" text-anchor="middle" class="small" fill="#fff">(K=5 Analogue Events)</text>
  </g>

  <path d="M295,195 L355,195" class="arrow"/>
  <path d="M295,295 L325,295 L325,215 L355,215" class="arrow"/>
  
  <path d="M480,250 L480,290" class="arrow"/>
  <path d="M480,350 L480,390" class="arrow"/>

  <!-- Panel 3: Memory Prediction -->
  <g filter="url(#shadow)">
    <rect x="665" y="160" width="250" height="70" fill="url(#mintGrad)" class="cardstroke"/>
    <text x="790" y="195" text-anchor="middle" class="label">Softmax Weights</text>
    <text x="790" y="215" text-anchor="middle" class="small">(Temperature = 0.1)</text>

    <rect x="665" y="270" width="250" height="70" fill="url(#beigeGrad)" class="cardstroke"/>
    <text x="790" y="305" text-anchor="middle" class="label">Weighted Returns</text>
    <text x="790" y="325" text-anchor="middle" class="small">Σ (Weight × Future Return)</text>

    <rect x="665" y="380" width="250" height="90" fill="url(#orangeGrad)" class="cardstroke"/>
    <text x="790" y="415" text-anchor="middle" class="label" fill="#fff">Memory Prediction</text>
    <text x="790" y="435" text-anchor="middle" class="small" fill="#fff">ŷ_mem</text>
    <text x="790" y="455" text-anchor="middle" class="tiny" fill="#fff">current_last_y + scale × returns</text>
  </g>

  <path d="M605,430 L635,430 L635,195 L665,195" class="arrow"/>
  <path d="M790,230 L790,270" class="arrow"/>
  <path d="M790,340 L790,380" class="arrow"/>

  <!-- Panel 4: Uncertainty Gated Blend -->
  <g filter="url(#shadow)">
    <rect x="975" y="160" width="250" height="70" fill="url(#lavGrad)" class="cardstroke"/>
    <text x="1100" y="195" text-anchor="middle" class="label">Similarity Scale</text>
    <text x="1100" y="215" text-anchor="middle" class="small">clip(mean(similarity), 0, 1)</text>

    <text x="1100" y="260" text-anchor="middle" class="tiny" fill="#ef6f68">← From MC Dropout</text>
    <rect x="975" y="270" width="250" height="70" fill="url(#roseGrad)" class="cardstroke"/>
    <text x="1100" y="305" text-anchor="middle" class="label">Uncertainty Scale</text>
    <text x="1100" y="325" text-anchor="middle" class="small">std_h / max(std_h)</text>

    <rect x="975" y="380" width="250" height="90" fill="url(#tealGrad)" class="cardstroke"/>
    <text x="1100" y="415" text-anchor="middle" class="label" fill="#fff">Blend Weight (W_h)</text>
    <text x="1100" y="440" text-anchor="middle" class="small" fill="#fff">Max 0.25 × Sim × Unc_h</text>
  </g>

  <path d="M605,430 L635,430 L635,130 L1100,130 L1100,160" class="dasharrow"/>
  
  <path d="M1100,230 L1100,380" class="arrow"/>
  <path d="M1100,340 L1100,380" class="arrow"/>

  <!-- Panel 5: Final Output -->
  <g filter="url(#shadow)">
    <text x="1420" y="150" text-anchor="middle" class="tiny" fill="#ef6f68">← From AAForecast Core</text>
    <rect x="1285" y="160" width="270" height="80" fill="url(#mintGrad)" class="cardstroke"/>
    <text x="1420" y="195" text-anchor="middle" class="label">Base Prediction (ŷ_base)</text>
    <text x="1420" y="220" text-anchor="middle" class="small">Core Backbone Output</text>

    <rect x="1285" y="290" width="270" height="120" fill="url(#blueGrad)" class="cardstroke"/>
    <text x="1420" y="325" text-anchor="middle" class="label" fill="#fff">Final Prediction</text>
    <text x="1420" y="355" text-anchor="middle" class="small" fill="#fff">ŷ_final_h =</text>
    <text x="1420" y="375" text-anchor="middle" class="small" fill="#fff">(1 - W_h) × ŷ_base</text>
    <text x="1420" y="395" text-anchor="middle" class="small" fill="#fff">+ W_h × ŷ_mem_h</text>
  </g>

  <!-- Flow to Final Prediction -->
  <path d="M915,425 L945,425 L945,485 L1250,485 L1250,380 L1285,380" class="arrow"/>
  <path d="M1225,425 L1265,425 L1265,350 L1285,350" class="arrow"/>
  <path d="M1420,240 L1420,290" class="arrow"/>
  
  <text x="800" y="595" text-anchor="middle" class="mono">Architecture of Retrieval-Augmented Memory Blend (ret.md)</text>
</svg>

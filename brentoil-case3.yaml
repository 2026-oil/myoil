task:
  name: brentoil_case3
dataset:
  path: data/df.csv
  target_col: Com_BrentCrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_Gasoline
  - Com_BloombergCommodity_BCOM
  - Com_LME_Ni_Cash
  - Com_Coal
  - Com_LME_Al_Cash
  - Bonds_KOR_10Y
  - Com_LMEX
  - Com_LME_Ni_Inv
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
training:
  train_protocol: expanding_window_tscv
  early_stop_patience_steps: -1
  loss: mse
cv:
  horizon: 8
  step_size: 4
  n_windows: 12
  gap: 0
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 2
  worker_devices: 1
residual:
  enabled: false
  model: xgboost
  params: {}
jobs:
- model: LSTM
  params: {}
- model: NHITS
  params: {}
- model: DLinear
  params: {}
- model: Autoformer
  params: {}
- model: FEDformer
  params: {}
- model: PatchTST
  params: {}
- model: iTransformer
  params: {}
- model: TimesNet
  params: {}
- model: Naive
  params: {}

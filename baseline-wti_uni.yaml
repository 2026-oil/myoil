task:
  name: baseline_wti
dataset:
  path: data/df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
  opt_n_trial: 20
training:
  train_protocol: expanding_window_tscv
  season_length: 52
  batch_size: 32
  valid_batch_size: 32
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  max_steps: 1000
  val_size: 8
  val_check_steps: 100
  early_stop_patience_steps: -1
  loss: mse
  dataloader_kwargs:
    num_workers: 2
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
cv:
  horizon: 8
  step_size: 4
  n_windows: 24
  gap: 0
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 2
  worker_devices: 1
  parallelize_single_job_tuning: true
residual:
  enabled: false
  model: xgboost
  params: {}
jobs:
- model: DLinear
  params: {}
- model: PatchTST
  params: {}
- model: iTransformer
  params: {}
- model: TimeMixer
  params: {}
- model: SMamba
  params: {}
- model: Naive
  params: {}

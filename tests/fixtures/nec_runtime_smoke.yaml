task:
  name: nec_runtime_smoke
dataset:
  path: tests/fixtures/nec_runtime_smoke.csv
  target_col: target
  dt_col: dt
  hist_exog_cols:
  - hist_a
  - hist_b
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
training:
  input_size: 4
  batch_size: 8
  valid_batch_size: 8
  windows_batch_size: 16
  inference_windows_batch_size: 16
  scaler_type: robust
  model_step_size: 1
  max_steps: 1
  val_size: 1
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
  optimizer:
    name: adamw
    kwargs: {}
cv:
  horizon: 2
  step_size: 2
  n_windows: 1
  gap: 0
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  max_concurrent_jobs: 1
  worker_devices: 1
  parallelize_single_job_tuning: false
jobs:
- model: NEC
nec:
  enabled: true
  config_path: tests/fixtures/nec_plugin_smoke.yaml

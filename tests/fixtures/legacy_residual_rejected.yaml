dataset:
  path: tests/fixtures/optuna_smoke_data.csv
  target_col: target
  dt_col: dt

runtime:
  random_seed: 1

training:
  input_size: 4
  batch_size: 8
  valid_batch_size: 8
  windows_batch_size: 16
  inference_windows_batch_size: 16
  max_steps: 1
  val_size: 1
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse

cv:
  horizon: 1
  step_size: 1
  n_windows: 1
  gap: 0
  overlap_eval_policy: by_cutoff_mean

scheduler:
  gpu_ids: [0]
  max_concurrent_jobs: 1
  worker_devices: 1

residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 8
    max_depth: 2

jobs:
  - model: Naive
    params: {}

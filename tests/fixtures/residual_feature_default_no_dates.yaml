dataset:
  path: tests/fixtures/optuna_smoke_data.csv
  target_col: target
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 7
training:
  input_size: 1
  season_length: 1
  batch_size: 1
  valid_batch_size: 1
  windows_batch_size: 8
  inference_windows_batch_size: 8
  learning_rate: 0.001
  max_steps: 1
  val_size: 1
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
cv:
  horizon: 1
  step_size: 1
  n_windows: 2
  gap: 0
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0]
  max_concurrent_jobs: 1
  worker_devices: 1
residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 8
    max_depth: 2
    learning_rate: 0.2
jobs:
  - model: TFT
    params:
      hidden_size: 32
      n_head: 4
      dropout: 0.1

dataset:
  path: tests/fixtures/optuna_smoke_data.csv
  target_col: target
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
residual:
  enabled: true
  model: lightgbm
  params:
    n_estimators: 8
    max_depth: 2
    num_leaves: 7
    min_child_samples: 5
    feature_fraction: 1.0
jobs:
- model: TFT
  params:
    hidden_size: 32
    n_head: 4
    dropout: 0.1

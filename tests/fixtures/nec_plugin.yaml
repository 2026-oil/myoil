nec:
  history_steps: 12
  hist_columns: []
  preprocessing:
    mode: diff_std
    probability_feature: true
    gmm_components: 2
    epsilon: 1.0
  merge_threshold: 0.5
  classifier:
    hidden_dim: 8
    layer_dim: 2
    dropout: 0.1
    batch_size: 4
    train_volume: 12
    epochs: 2
    early_stop_patience: 1
    encoder_lr: 0.001
    head_lr: 0.0005
    oversampling: true
    normal_ratio: 0.0
    bce_weight: 0.5
    mse_weight: 0.5
  normal:
    hidden_dim: 8
    layer_dim: 2
    dropout: 0.1
    batch_size: 4
    train_volume: 12
    epochs: 2
    early_stop_patience: 1
    encoder_lr: 0.001
    head_lr: 0.0005
    oversampling: false
    normal_ratio: 0.0
  extreme:
    hidden_dim: 8
    layer_dim: 2
    dropout: 0.1
    batch_size: 4
    train_volume: 12
    epochs: 2
    early_stop_patience: 1
    encoder_lr: 0.001
    head_lr: 0.0005
    oversampling: true
    normal_ratio: 0.0
  validation:
    windows: 2

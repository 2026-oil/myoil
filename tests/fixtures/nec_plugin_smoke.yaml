nec:
  preprocessing:
    mode: diff_std
    gmm_components: 2
    epsilon: 1.2
  inference:
    mode: soft_weighted
    threshold: 0.5
  classifier:
    model: MLP
    variables: []
    model_params:
      hidden_size: 16
      num_layers: 1
    alpha: 2.0
    beta: 0.5
    oversample_extreme_windows: true
  normal:
    model: MLP
    variables:
      - hist_a
    model_params:
      hidden_size: 16
      num_layers: 1
    oversample_extreme_windows: false
  extreme:
    model: MLP
    variables:
      - hist_a
      - hist_b
    model_params:
      hidden_size: 16
      num_layers: 1
    oversample_extreme_windows: true
  validation:
    windows: 2

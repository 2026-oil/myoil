nec:
  history_steps: 4
  hist_columns:
    - hist_a
    - hist_b
  preprocessing:
    mode: diff_std
    probability_feature: true
    gmm_components: 2
    epsilon: 1.2
  classifier:
    hidden_dim: 16
    layer_dim: 2
    dropout: 0.1
    batch_size: 2
    train_volume: 8
    epochs: 2
    early_stop_patience: 1
    encoder_lr: 0.001
    head_lr: 0.001
  normal:
    hidden_dim: 16
    layer_dim: 2
    dropout: 0.1
    batch_size: 2
    train_volume: 8
    epochs: 2
    early_stop_patience: 1
    encoder_lr: 0.001
    head_lr: 0.001
    oversampling: false
    normal_ratio: 0.0
  extreme:
    hidden_dim: 16
    layer_dim: 2
    dropout: 0.1
    batch_size: 2
    train_volume: 8
    epochs: 2
    early_stop_patience: 1
    encoder_lr: 0.001
    head_lr: 0.001
    oversampling: true
    normal_ratio: 0.0
  validation:
    windows: 2

aa_forecast:
  model: itransformer
  tune_training: false
  lowess_frac: 0.6
  lowess_delta: 0.01
  uncertainty:
    enabled: false
    sample_count: 3
  model_params:
    hidden_size: 64
    n_heads: 4
    e_layers: 1
    dropout: 0.1
    d_ff: 128
    factor: 1
    use_norm: true
  star_anomaly_tails:
    upward:
    - event
    two_sided: []

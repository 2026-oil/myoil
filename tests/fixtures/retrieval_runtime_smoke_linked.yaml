task:
  name: validate_only_retrieval_linked_smoke
dataset:
  path: aa_forecast_runtime_smoke.csv
  target_col: target
  dt_col: dt
  hist_exog_cols:
  - event
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 7
training:
  input_size: 4
  batch_size: 1
  valid_batch_size: 1
  windows_batch_size: 4
  inference_windows_batch_size: 4
  max_steps: 1
  val_size: 2
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
  accelerator: cpu
cv:
  horizon: 2
  step_size: 1
  n_windows: 1
  gap: 0
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  max_concurrent_jobs: 1
  worker_devices: 1
retrieval:
  enabled: true
  config_path: tests/fixtures/retrieval_smoke_detail.yaml
jobs:
- model: GRU
  params:
    encoder_hidden_size: 8
    encoder_n_layers: 1
    encoder_dropout: 0.0
    decoder_hidden_size: 8
    decoder_layers: 1

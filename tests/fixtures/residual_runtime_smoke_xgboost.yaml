dataset:
  path: tests/fixtures/optuna_smoke_data.csv
  target_col: target
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
training:
  input_size: 1
  learning_rate: 0.001
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
cv:
  horizon: 1
  step_size: 1
  n_windows: 2
scheduler:
  gpu_ids:
  - 0
residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 8
    max_depth: 2
    learning_rate: 0.2
jobs:
- model: TFT
  params:
    hidden_size: 32
    n_head: 4
    dropout: 0.1

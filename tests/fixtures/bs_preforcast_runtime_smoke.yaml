dataset:
  path: tests/fixtures/bs_preforcast_smoke_data.csv
  target_col: target
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
bs_preforcast:
  enabled: true
  config_path: bs_preforcast_stage_smoke.yaml
  using_futr_exog: false
  target_columns: [bs_a]
  task:
    multivariable: false
runtime:
  random_seed: 7
training:
  input_size: 1
  season_length: 1
  batch_size: 1
  valid_batch_size: 1
  windows_batch_size: 8
  inference_windows_batch_size: 8
  learning_rate: 0.001
  max_steps: 1
  val_size: 1
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
cv:
  horizon: 1
  step_size: 1
  n_windows: 2
  gap: 0
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0]
  max_concurrent_jobs: 1
  worker_devices: 1
  parallelize_single_job_tuning: false
residual:
  enabled: false
  model: xgboost
  params:
    n_estimators: 8
jobs:
  - model: Naive
    params: {}

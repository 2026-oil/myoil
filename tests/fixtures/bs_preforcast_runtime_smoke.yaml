dataset:
  path: tests/fixtures/bs_preforcast_smoke_data.csv
  target_col: target
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
bs_preforcast:
  enabled: true
  config_path: bs_preforcast_stage_smoke.yaml
training:
  input_size: 1
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
  lr_scheduler:
    name: OneCycleLR
    max_lr: 0.001
    pct_start: 0.3
    div_factor: 25.0
    final_div_factor: 10000.0
    anneal_strategy: cos
    three_phase: false
    cycle_momentum: false
cv:
  horizon: 1
  step_size: 1
  n_windows: 2
scheduler:
  gpu_ids:
  - 0
  parallelize_single_job_tuning: false
residual:
  enabled: false
  model: xgboost
  params:
    n_estimators: 8
jobs:
- model: Naive
  params: {}

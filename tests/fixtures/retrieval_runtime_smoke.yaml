task:
  name: validate_only_retrieval_smoke
dataset:
  path: aa_forecast_runtime_smoke.csv
  target_col: target
  dt_col: dt
  hist_exog_cols:
  - event
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 7
training:
  input_size: 4
  batch_size: 1
  valid_batch_size: 1
  windows_batch_size: 4
  inference_windows_batch_size: 4
  max_steps: 1
  val_size: 2
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
  accelerator: cpu
cv:
  horizon: 2
  step_size: 1
  n_windows: 1
  gap: 0
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  max_concurrent_jobs: 1
  worker_devices: 1
retrieval:
  enabled: true
  star:
    season_length: 2
    lowess_frac: 0.5
    lowess_delta: 0.01
    thresh: 3.0
    anomaly_tails:
      upward:
      - event
      two_sided: []
  mode: posthoc_blend
  top_k: 1
  recency_gap_steps: 1
  trigger_quantile: 0.5
  neighbor_min_event_ratio: 0.0
  min_similarity: 0.0
  similarity: cosine
  temperature: 0.1
  memory_value_mode: future_return
  blend_floor: 0.2
  blend_max: 0.3
  use_uncertainty_gate: false
  use_shape_key: true
  use_event_key: true
  event_score_log_bonus_alpha: 0.0
  event_score_log_bonus_cap: 0.0
jobs:
- model: GRU
  params:
    encoder_hidden_size: 8
    encoder_n_layers: 1
    encoder_dropout: 0.0
    decoder_hidden_size: 8
    decoder_layers: 1

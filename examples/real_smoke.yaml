dataset:
  path: ../../df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
training:
  input_size: 8
  season_length: 52
  batch_size: 16
  valid_batch_size: 16
  windows_batch_size: 32
  inference_windows_batch_size: 32
  learning_rate: 0.001
  max_steps: 10
  val_size: 0
  loss: mse
cv:
  horizon: 2
  step_size: 2
  n_windows: 1
  final_holdout: 2
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0, 1]
  max_concurrent_jobs: 2
  worker_devices: 1
residual:
  enabled: true
  model: xgboost
  params:
    n_estimators: 8
    max_depth: 2
    learning_rate: 0.2
    subsample: 1.0
    colsample_bytree: 1.0
jobs:
  - model: TFT
    params: {}
  - model: iTransformer
    params: {}

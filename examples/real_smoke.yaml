dataset:
  path: ../../df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
training:
  input_size: 8
  season_length: 52
  batch_size: 16
  valid_batch_size: 16
  windows_batch_size: 32
  inference_windows_batch_size: 32
  learning_rate: 0.001
  max_steps: 1
  val_size: 0
  loss: mse
cv:
  horizon: 2
  step_size: 2
  n_windows: 1
  final_holdout: 2
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0, 1]
  max_concurrent_jobs: 2
  worker_devices: 1
residual:
  enabled: true
  train_source: oof_cv
  model: lstm
  params:
    lookback: 2
    hidden_size: 8
    num_layers: 1
    epochs: 1
    learning_rate: 0.01
jobs:
  - model: TFT
    params: {}
  - model: iTransformer
    params: {}

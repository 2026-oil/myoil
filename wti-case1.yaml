task:
  name: wti_case1
dataset:
  path: data/df.csv
  target_col: Com_CrudeOil
  dt_col: dt
  hist_exog_cols:
  - Com_Gasoline
  - Com_LME_Zn_Inv
  - Com_OrangeJuice
  - Com_Cheese
  - Bonds_BRZ_1Y
  - Idx_OVX
  - Com_Cu_Gold_Ratio
  - Com_LME_Sn_Inv
  - Idx_CSI300
  - Com_LME_Zn_Spread
  - Bonds_CHN_Spread_5Y_2Y
  - Com_LME_Al_Spread
  - Bonds_CHN_Spread_2Y_1Y
  - Com_Oil_Spread
  - Bonds_CHN_Spread_10Y_5Y
  futr_exog_cols: []
  static_exog_cols: []
runtime:
  random_seed: 1
training:
  train_protocol: expanding_window_tscv
  input_size: 64
  season_length: 52
  batch_size: 32
  valid_batch_size: 32
  windows_batch_size: 1024
  inference_windows_batch_size: 1024
  learning_rate: 0.001
  max_steps: 1000
  val_size: 8
  val_check_steps: 100
  early_stop_patience_steps: -1
  loss: mse
cv:
  horizon: 8
  step_size: 4
  n_windows: 12
  gap: 0
  max_train_size: null
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids:
  - 0
  - 1
  max_concurrent_jobs: 2
  worker_devices: 1
residual:
  enabled: false
  model: xgboost
  params: {}
jobs:
- model: LSTM
  params:
    encoder_hidden_size: 64
    decoder_hidden_size: 64
    encoder_n_layers: 2
    context_size: 10
- model: NHITS
  params:
    n_pool_kernel_size:
    - 2
    - 2
    - 1
    n_freq_downsample:
    - 24
    - 12
    - 1
    dropout_prob_theta: 0.0
- model: DLinear
  params:
    moving_avg_window: 7
- model: Autoformer
  params:
    hidden_size: 64
    dropout: 0.1
    factor: 3
    n_head: 4
- model: FEDformer
  params:
    hidden_size: 64
    modes: 32
    dropout: 0.1
    n_head: 8
- model: PatchTST
  params:
    hidden_size: 64
    n_heads: 4
    encoder_layers: 2
    patch_len: 16
    dropout: 0.1
- model: iTransformer
  params:
    hidden_size: 64
    n_heads: 4
    e_layers: 2
    d_ff: 256
    dropout: 0.1
- model: TimesNet
  params:
    hidden_size: 64
    conv_hidden_size: 64
    top_k: 5
    encoder_layers: 2
- model: Naive
  params: {}

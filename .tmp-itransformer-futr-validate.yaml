task:
  name: itransformer_futr_validate
dataset:
  path: .tmp-itransformer-futr-validate.csv
  target_col: target
  dt_col: dt
  hist_exog_cols: []
  futr_exog_cols: [futr_a]
  static_exog_cols: []
runtime:
  random_seed: 7
training:
  input_size: 1
  batch_size: 1
  valid_batch_size: 1
  windows_batch_size: 8
  inference_windows_batch_size: 8
  lr_scheduler:
    name: OneCycleLR
    max_lr: 0.001
    pct_start: 0.3
    div_factor: 25.0
    final_div_factor: 10000.0
    anneal_strategy: cos
    three_phase: false
    cycle_momentum: false
  max_steps: 1
  val_size: 1
  val_check_steps: 1
  early_stop_patience_steps: -1
  loss: mse
cv:
  horizon: 1
  step_size: 1
  n_windows: 2
  gap: 0
  overlap_eval_policy: by_cutoff_mean
scheduler:
  gpu_ids: [0]
  max_concurrent_jobs: 1
  worker_devices: 1
residual:
  enabled: false
  model: xgboost
  params: {}
jobs:
  - model: iTransformer
    params:
      hidden_size: 8
      n_heads: 1
      e_layers: 1
      d_ff: 16

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <style>
      .title { font: 700 32px 'Georgia', 'Times New Roman', serif; fill: #111; }
      .label { font: 600 24px 'Georgia', 'Times New Roman', serif; fill: #111; }
      .text { font: 18px 'Georgia', 'Times New Roman', serif; fill: #222; }
      .small { font: 16px 'Georgia', 'Times New Roman', serif; fill: #222; }
      .tiny { font: 14px 'Georgia', 'Times New Roman', serif; fill: #333; }
      .mono-heavy { font: 24px 'Arial Black', 'Arial', sans-serif; font-weight: 900; fill: #d44b43; }
      .panel { fill: #fafafa; stroke: #444; stroke-width: 3; stroke-dasharray: 10 6; rx: 28; ry: 28; }
      .arrow { stroke: #222; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dasharrow { stroke: #444; stroke-width: 2.5; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrowhead); }
      .cardstroke { stroke: #333; stroke-width: 2.5; rx: 18; ry: 18; }
      .outbox { fill: #fdfdfd; stroke: #222; stroke-width: 3; rx: 18; ry: 18; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#222"/>
    </marker>
    <linearGradient id="goldGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5cb54"/>
      <stop offset="100%" stop-color="#d7a41d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#de7d37"/>
      <stop offset="100%" stop-color="#b95b19"/>
    </linearGradient>
    <linearGradient id="beigeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fdf1c0"/>
      <stop offset="100%" stop-color="#f4e5a7"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d5ead8"/>
      <stop offset="100%" stop-color="#b9d6bf"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#72ddd3"/>
      <stop offset="100%" stop-color="#43b7ae"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4bbcf2"/>
      <stop offset="100%" stop-color="#1c86c8"/>
    </linearGradient>
    <linearGradient id="lavGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d8dbe8"/>
      <stop offset="100%" stop-color="#bfc5d7"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3b6af"/>
      <stop offset="100%" stop-color="#e68f84"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2.0" dy="3.0" stdDeviation="5.0" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Panels -->
  <rect x="10" y="55" width="280" height="500" class="panel"/>
  <rect x="305" y="55" width="300" height="500" class="panel"/>
  <rect x="620" y="55" width="300" height="500" class="panel"/>
  <rect x="935" y="55" width="300" height="500" class="panel"/>
  <rect x="1250" y="55" width="335" height="500" class="panel"/>

  <!-- Titles -->
  <text x="150" y="105" text-anchor="middle" class="title">STAR</text>
  <text x="455" y="105" text-anchor="middle" class="title">AAForecast</text>
  <text x="770" y="105" text-anchor="middle" class="title">Uncertainty</text>
  <text x="1085" y="105" text-anchor="middle" class="title">Retrieval</text>
  <text x="1417.5" y="105" text-anchor="middle" class="title">Final</text>

  <!-- Panel 1: STAR Details -->
  <g transform="translate(0, 50)">
    <text x="50" y="195" class="label">Trend</text>
    <rect x="170" y="165" width="90" height="42" fill="white" stroke="#444" stroke-width="1.7"/>
    <path d="M172,193 Q200,175 230,190 T260,180" fill="none" stroke="#8b8b8b" stroke-width="4.0"/>

    <text x="50" y="255" class="label">Season</text>
    <rect x="170" y="225" width="90" height="42" fill="white" stroke="#444" stroke-width="1.7"/>
    <path d="M172,246 c5,-18 15,-18 20,0 s15,18 20,0 c5,-18 15,-18 20,0" fill="none" stroke="#9fc1ff" stroke-width="3.5"/>

    <text x="50" y="315" class="label">Anom.</text>
    <rect x="170" y="285" width="90" height="42" fill="white" stroke="#444" stroke-width="1.7"/>
    <polyline points="172,320 200,320 205,290 210,320 235,320 240,285 245,320 260,320" fill="none" stroke="#ef6f68" stroke-width="4.0"/>

    <text x="50" y="375" class="label">Resid.</text>
    <rect x="170" y="345" width="90" height="42" fill="white" stroke="#444" stroke-width="1.7"/>
    <polyline points="172,370 177,363 182,367 187,359 192,365 197,353 202,359 207,347 212,357 217,350 222,361 227,353 232,363 237,355 242,367 247,359 252,371 257,363 260,370" fill="none" stroke="#4a58ff" stroke-width="2.5"/>
  </g>

  <!-- Panel 2: AAForecast Module -->
  <g filter="url(#shadow)">
    <rect x="330" y="150" width="250" height="100" fill="url(#orangeGrad)" class="cardstroke"/>
    <text x="455" y="210" text-anchor="middle" class="label" fill="#fff">STAR Feature Set</text>

    <rect x="330" y="280" width="250" height="120" fill="url(#beigeGrad)" class="cardstroke"/>
    <text x="455" y="335" text-anchor="middle" class="label">GRU Backbone</text>
    <text x="455" y="375" text-anchor="middle" class="small">(Hidden State)</text>

    <rect x="330" y="430" width="250" height="100" fill="url(#mintGrad)" class="cardstroke"/>
    <text x="455" y="490" text-anchor="middle" class="label">Prediction Head</text>
  </g>

  <!-- Panel 3: Uncertainty Optimization -->
  <g filter="url(#shadow)">
    <rect x="635" y="150" width="270" height="170" fill="#fff" class="cardstroke"/>
    <text x="770" y="200" text-anchor="middle" class="label">Dynamic Ens.</text>
    
    <g transform="translate(15, 60)">
      <line x1="680" y1="185" x2="680" y2="255" stroke="#333" stroke-width="4.0"/>
      <rect x="630" y="200" width="100" height="35" fill="#d5ead8" stroke="#333" stroke-width="4.0"/>
      
      <line x1="785" y1="180" x2="785" y2="260" stroke="#333" stroke-width="4.0"/>
      <rect x="735" y="195" width="100" height="45" fill="#d5ead8" stroke="#333" stroke-width="4.0"/>
    </g>

    <rect x="635" y="350" width="270" height="170" fill="url(#tealGrad)" class="cardstroke"/>
    <text x="770" y="445" text-anchor="middle" class="label" fill="#fff">Uncertainty Sel.</text>
  </g>

  <!-- Panel 4: Retrieval Augmented -->
  <g filter="url(#shadow)">
    <rect x="945" y="150" width="280" height="170" fill="url(#roseGrad)" class="cardstroke"/>
    <text x="1085" y="245" text-anchor="middle" class="label">Event Query</text>

    <rect x="945" y="350" width="280" height="170" fill="url(#mintGrad)" class="cardstroke"/>
    <text x="1085" y="415" text-anchor="middle" class="label">Memory Bank</text>
    <text x="1085" y="455" text-anchor="middle" class="small">Top-K Analogues</text>
  </g>

  <!-- Panel 5: Final Output -->
  <g filter="url(#shadow)">
    <rect x="1275" y="140" width="285" height="430" class="outbox"/>
    
    <text x="1417.5" y="195" text-anchor="middle" class="label">Prediction Curve</text>
    
    <path d="M1295,340 L1315,310 L1335,330 L1355,285 L1385,315 L1410,270" fill="none" stroke="#5a5ce6" stroke-width="6" stroke-linecap="round"/>
    
    <g>
      <circle cx="1355" cy="285" r="6" fill="#f1a13e" stroke="#fff" stroke-width="2"/>
      <text x="1365" y="280" text-anchor="start" class="mono-heavy">ŷ1</text>
      
      <circle cx="1385" cy="315" r="6" fill="#f1a13e" stroke="#fff" stroke-width="2"/>
      <text x="1395" y="335" text-anchor="start" class="mono-heavy">ŷ2</text>
      
      <circle cx="1410" cy="270" r="6" fill="#f1a13e" stroke="#fff" stroke-width="2"/>
      <text x="1420" y="265" text-anchor="start" class="mono-heavy">ŷ3</text>
    </g>

    <line x1="1295" y1="395" x2="1535" y2="395" stroke="#ccc" stroke-width="2" stroke-dasharray="8 8"/>

    <text x="1417.5" y="440" text-anchor="middle" class="label">Weight Dist.</text>
    <g transform="translate(1417.5, 520)">
       <rect x="-85" y="-15" width="45" height="30" fill="#3498db" opacity="0.6"/>
       <rect x="-22" y="-55" width="45" height="70" fill="#3498db" opacity="0.6"/>
       <rect x="40" y="-35" width="45" height="50" fill="#3498db" opacity="0.6"/>
    </g>
  </g>

  <!-- Arrows -->
  <path d="M290,305 L305,305" class="arrow"/>
  <path d="M605,305 L620,305" class="arrow"/>
  <path d="M920,305 L945,305" class="arrow"/>
  <path d="M1225,305 L1250,305" class="arrow"/>
</svg>
